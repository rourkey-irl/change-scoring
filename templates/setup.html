<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First-Time Setup — Change Request Scoring Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="6" fill="#2563EB"/>
        <path d="M7 14.5L11.5 19L21 9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="auth-title">Create Admin Account</h1>
    <p class="auth-sub">No users exist yet. Set up the first administrator account to get started.</p>

    {% if errors %}
    <div class="auth-error">
      <ul class="auth-error-list">
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="POST" action="/setup" class="auth-form">
      <div class="auth-field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required autofocus placeholder="Jane Smith" />
      </div>
      <div class="auth-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="admin@example.com" />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••••" />
        <p class="auth-hint">Min 10 characters · uppercase · lowercase · number · special character</p>
      </div>
      <div class="auth-field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="••••••••••" />
      </div>
      <button type="submit" class="btn btn-primary">Create Admin Account</button>
    </form>
  </div>
</body>
</html>
